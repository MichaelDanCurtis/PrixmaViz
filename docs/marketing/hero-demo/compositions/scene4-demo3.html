      .d3-canvas {

        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.4;
      }

      .d3-canvas .d3-bloom {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 1700px;
        height: 1000px;
        margin-left: -850px;
        margin-top: -500px;
        background: radial-gradient(
          circle at 50% 45%,
          rgba(167, 139, 250, 0.16) 0%,
          rgba(167, 139, 250, 0) 55%

      .d3-canvas .d3-header {

        left: 80px;
        right: 80px;
        top: 70px;
        display: flex;
        align-items: center;
        gap: 16px;

        box-shadow: 0 0 18px rgba(167, 139, 250, 0.7);

        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #8b949e;
        font-weight: 600;
      }

      .d3-canvas .d3-header-rule {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, #2a2a35, transparent);
      }

      /* Stage holds all five tiles centered, each rotates in for its turn */
      .d3-canvas .d3-stage {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 1200px;
        height: 720px;
      }

      .d3-canvas .d3-tile {
        position: absolute;
        left: 50%;
        top: 50%;
        margin-left: -600px;
        margin-top: -360px;
        width: 1200px;
        height: 720px;
        background: #13131a;
        border: 1px solid #2a2a35;
        border-radius: 14px;
        box-shadow: 0 36px 90px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        opacity: 0;
        will-change: transform, opacity;
      }

      .d3-canvas .d3-tile-chrome {
        height: 64px;
        background: #0f0f15;
        border-bottom: 1px solid #2a2a35;

        align-items: center;
        justify-content: space-between;
        padding: 0 32px;

      .d3-canvas .tile-eng {

      .d3-canvas .tile-id {
        font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
        font-size: 18px;
        color: #8b949e;
        background: rgba(139, 148, 158, 0.1);
        border: 1px solid rgba(139, 148, 158, 0.25);
        padding: 5px 12px;
        border-radius: 999px;
        font-weight: 600;
      }

      .d3-canvas .d3-tile-body {
        padding: 30px 50px 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: calc(100% - 64px);
      }

      .d3-canvas .d3-diag {
        width: 100%;
        height: 100%;
        max-height: 100%;
      }

      .d3-canvas .d3-diag text {
        paint-order: stroke fill;
        stroke: #13131a;
        stroke-width: 4;
        stroke-linejoin: round;
      }

      .d3-canvas .edge-label {

      }
      .d3-canvas .edge-label-amber {
        color: #fbbf24;

        right: 80px;
        top: 60px;
        display: flex;
        align-items: center;
        gap: 18px;

      .d3-canvas .d3-counter-stack {

        flex-direction: column;
        line-height: 1.05;
      }

      .d3-canvas .d3-counter-label {
        font-family: "Inter", sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: #60a5fa;
        letter-spacing: -0.01em;

      .d3-canvas .d3-counter-sub {

      }

      /* Ribbon at bottom */
      .d3-canvas .d3-ribbon {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 60px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        padding: 0 80px;
        opacity: 0;
      }

      .d3-canvas .ribbon-chip {
        font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
        font-size: 18px;
        color: #8b949e;
        background: #13131a;
        border: 1px solid #2a2a35;
        padding: 8px 16px;
        border-radius: 999px;
      }

      .d3-canvas .ribbon-chip:nth-child(odd) {
        color: #60a5fa;
        border-color: rgba(96, 165, 250, 0.3);
      }

      .d3-canvas .ribbon-chip:last-child {
        color: #fbbf24;
        border-color: rgba(251, 191, 36, 0.4);
        background: rgba(251, 191, 36, 0.05);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const S = ".d3-canvas ";

        // Backdrop
        tl.fromTo(
          S + ".d3-grid",
          { opacity: 0 },
          { opacity: 0.4, duration: 0.5, ease: "power2.out" },
          0,
        );
        tl.fromTo(
          S + ".d3-bloom",
          { opacity: 0, scale: 0.92 },
          { opacity: 1, scale: 1, duration: 0.8, ease: "sine.out" },
          0,
        );

        // Header
        tl.fromTo(
          S + ".d3-header",
          { opacity: 0, y: -10 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          0.15,
        );

        // 5 tiles cut in at ~1.1s intervals — each rotates slightly and fades
        const tiles = [
          ".d3-tile-1",
          ".d3-tile-2",
          ".d3-tile-3",
          ".d3-tile-4",
          ".d3-tile-5",
        ];
        const startT = 0.55;
        const gap = 1.05;

        tiles.forEach(function (sel, i) {
          const t = startT + i * gap;
          tl.fromTo(
            S + sel,
            {
              opacity: 0,
              scale: 0.92,
              rotate: i % 2 === 0 ? -1.5 : 1.5,
            },
            {
              opacity: 1,
              scale: 1,
              rotate: 0,
              duration: 0.35,
              ease: "expo.out",
            },
            t,
          );

          // hold for ~0.85s then exit, except last which holds through outro
          if (i < tiles.length - 1) {
            tl.to(
              S + sel,
              {
                opacity: 0,
                scale: 1.05,
                rotate: i % 2 === 0 ? 1.5 : -1.5,
                duration: 0.25,
                ease: "power3.in",
              },
              t + 0.85,
            );
          }
        });

        // Counter pops on with the last tile
        tl.fromTo(
          S + ".d3-counter",
          { opacity: 0, y: 10, scale: 0.94 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" },
          startT + 4 * gap,
        );

        // Counter breathes
        tl.to(
          S + ".d3-counter-num",
          { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 },
          startT + 4 * gap + 0.4,
        );

        // Ribbon fades in
        tl.fromTo(
          S + ".d3-ribbon",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" },
          startT + 4 * gap + 0.2,
        );

        // Stagger ribbon chips for a real ripple
        tl.fromTo(
          S + ".ribbon-chip",
          { opacity: 0, y: 8 },
          {
            opacity: 1,
            y: 0,
            duration: 0.25,
            ease: "power2.out",
            stagger: 0.025,
          },
          startT + 4 * gap + 0.25,
        );

        window.__timelines = window.__timelines || {};
        window.__timelines["scene4-demo3"] = tl;
      })();
    </script>
  </div>
</template>
