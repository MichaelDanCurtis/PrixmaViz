    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const S = ".d2-canvas ";

        // Backdrop
        tl.fromTo(
          S + ".d2-grid",
          { opacity: 0 },
          { opacity: 0.4, duration: 0.5, ease: "power2.out" },
          0,
        );
        tl.fromTo(
          S + ".d2-bloom",
          { opacity: 0, scale: 0.92 },
          { opacity: 1, scale: 1, duration: 0.8, ease: "sine.out" },
          0,
        );

        // Tile already feels persistent — fades in fast and tight
        tl.fromTo(
          S + ".d2-tile",
          { opacity: 0, scale: 0.97 },
          { opacity: 1, scale: 1, duration: 0.45, ease: "expo.out" },
          0.1,
        );

        // Toolbar appears
        tl.fromTo(
          S + ".d2-toolbar",
          { opacity: 0, x: -40 },
          { opacity: 1, x: 0, duration: 0.45, ease: "expo.out" },
          0.3,
        );

        // Cursor enters from bottom-right, glides toward the region
        // d2-cursor starts offscreen (set inside the timeline so it's deterministic)
        tl.set(S + ".d2-cursor", { x: 1700, y: 980 }, 0);

        tl.to(
          S + ".d2-cursor",
          { x: 880, y: 240, duration: 0.95, ease: "power3.inOut" },
          0.85,
        );

        // Region annotation appears — start drag
        tl.to(S + ".d2-region", { opacity: 1, duration: 0.1 }, 1.85);
        tl.fromTo(
          S + ".d2-region-rect",
          { scaleY: 0 },
          { scaleY: 1, duration: 0.7, ease: "power3.inOut" },
          1.85,
        );

        // Cursor drags down-right while the region scales
        tl.to(
          S + ".d2-cursor",
          { x: 1140, y: 700, duration: 0.7, ease: "power3.inOut" },
          1.85,
        );

        // Handles pop in
        tl.fromTo(
          S + ".d2-region-handles",
          { opacity: 0, scale: 0.6 },
          { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.6)" },
          2.55,
        );

        // Region tag pops
        tl.fromTo(
          S + ".d2-region-tag",
          { opacity: 0, y: 6 },
          { opacity: 1, y: 0, duration: 0.3, ease: "back.out(1.4)" },
          2.7,
        );

        // Cursor pulls back a touch — like releasing the drag
        tl.to(
          S + ".d2-cursor",
          { x: 1180, y: 660, duration: 0.3, ease: "power2.out" },
          2.75,
        );

        // Bubble slides in from the right side
        tl.fromTo(
          S + ".d2-bubble",
          { opacity: 0, x: 40, y: 10 },
          { opacity: 1, x: 0, y: 0, duration: 0.55, ease: "expo.out" },
          3.2,
        );

        // Cursor drifts toward bubble while it stays for reading
        tl.to(
          S + ".d2-cursor",
          { x: 1500, y: 380, duration: 0.6, ease: "power2.inOut" },
          3.4,
        );

        // Bubble holds, then a subtle breathe
        tl.to(
          S + ".d2-bubble",
          { y: -4, duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 1 },
          4.0,
        );

        // Tagline appears toward end of scene
        tl.fromTo(
          S + ".d2-tagline",
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" },
          5.6,
        );

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-demo2"] = tl;
      })();
    </script>
