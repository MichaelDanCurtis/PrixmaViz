name: Release shim binaries

# Builds the five cross-compiled MCP shim binaries and attaches them to the
# GitHub Release whenever a `v*` tag is pushed. The CC plugin launcher script
# (bin/prixmaviz-mcp + bin/prixmaviz-mcp.cmd) downloads from
# `releases/download/v<version>/prixmaviz-mcp-<platform>`, so the asset names
# below are load-bearing — don't rename them without updating the launchers.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build all 5 shim binaries
        working-directory: packages/shim
        run: bun run build:all

      - name: Show built artifacts
        run: ls -lh dist/prixmaviz-mcp-*

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Cross-compiled MCP shim binaries for $TAG. The CC plugin launcher downloads the matching artifact automatically on first use."
          fi
          gh release upload "$TAG" \
            dist/prixmaviz-mcp-darwin-arm64 \
            dist/prixmaviz-mcp-darwin-x64 \
            dist/prixmaviz-mcp-linux-arm64 \
            dist/prixmaviz-mcp-linux-x64 \
            dist/prixmaviz-mcp-windows-x64.exe \
            --clobber
